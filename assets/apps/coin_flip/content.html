<form id="flip-form">
  <div class="form-group">
    <label for="num-coins">Number of Coins</label>
    <input type="number" id="num-coins" value="50" min="1">
  </div>
  <div class="form-group">
    <label for="num-trials">Number of Trials</label>
    <input type="number" id="num-trials" value="100" min="1">
  </div>
  <div class="form-group">
    <label for="prob-heads">Probability of Heads: <span id="prob-display">0.50</span></label>
    <input type="range" id="prob-heads" min="0" max="1" step="0.01" value="0.5">
  </div>
  <button type="button" id="run-btn">Run Simulation</button>
</form>

<div id="flip-plot"></div>
